<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renters Insurance Premium Calculator</title>
    <meta
      name="description"
      content="Estimate monthly renters insurance premium by city, deductible, property value, and risk factors."
    />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T4LXDFRGN3"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-T4LXDFRGN3');
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
      :root {
        --primary: #1d4ed8;
        --text: #334155;
        --heading: #0f172a;
        --bg: #f8fafc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        line-height: 1.7;
      }
      .container { width: min(900px, 92%); margin: 0 auto; }
      header, footer { background: #fff; border-bottom: 1px solid #e2e8f0; }
      footer { border-top: 1px solid #e2e8f0; border-bottom: 0; margin-top: 24px; }
      .nav {
        padding: 14px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo { color: var(--heading); text-decoration: none; font-weight: 700; }
      nav a { color: var(--text); text-decoration: none; margin-left: 12px; }
      main { padding: 30px 0; }
      h1, h2 { color: var(--heading); }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 16px;
      }
      .grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); }
      label { font-size: 14px; color: #475569; display: block; margin-bottom: 4px; }
      input, select {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
      }
      .result {
        margin-top: 12px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        padding: 12px;
      }
      .small { color: #64748b; font-size: 14px; }
    </style>
  </head>
  <body>
    <header>
      <div class="container nav">
        <a class="logo" href="../index.html">Renters Insurance Cost Guide</a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../city-cost-template.html">City Template</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h1>Renters Insurance Premium Calculator</h1>
      <p class="small">
        This estimator is for educational planning only. Actual premium depends on insurer underwriting and local conditions.
      </p>

      <div class="card">
        <form id="premium-form-tool">
          <div class="grid">
            <div>
              <label for="city">City</label>
              <select id="city" name="city">
                <option value="los-angeles">Los Angeles</option>
                <option value="houston">Houston</option>
                <option value="new-york">New York</option>
                <option value="miami">Miami</option>
                <option value="chicago">Chicago</option>
                <option value="seattle">Seattle</option>
              </select>
            </div>
            <div>
              <label for="propertyValue">Total personal property value (USD)</label>
              <input id="propertyValue" name="propertyValue" type="number" value="25000" min="5000" step="1000" />
            </div>
            <div>
              <label for="deductible">Deductible</label>
              <select id="deductible" name="deductible">
                <option value="250">$250</option>
                <option value="500" selected>$500</option>
                <option value="1000">$1,000</option>
              </select>
            </div>
            <div>
              <label for="liabilityLimit">Liability limit</label>
              <select id="liabilityLimit" name="liabilityLimit">
                <option value="100000">$100,000</option>
                <option value="300000">$300,000</option>
              </select>
            </div>
          </div>
          <p>
            <label><input type="checkbox" id="priorClaims" name="priorClaims" /> Prior claim in last 3 years</label><br />
            <label><input type="checkbox" id="bundle" name="bundle" /> Bundle with auto insurance</label><br />
            <label><input type="checkbox" id="alarm" name="alarm" /> Home has alarm/security system</label>
          </p>
        </form>
        <div id="premium-output-tool" class="result"></div>
      </div>
    </main>

    <footer>
      <div class="container" style="padding: 18px 0;">
        <a href="../about.html">About</a> ·
        <a href="../contact.html">Contact</a> ·
        <a href="../privacy-policy.html">Privacy Policy</a> ·
        <a href="../disclaimer.html">Disclaimer</a>
      </div>
    </footer>

    <script src="../assets/premium-calculator.js"></script>
    <script>
      window.RentersPremiumCalculator.mountCalculator("premium-form-tool", "premium-output-tool");
    </script>
  </body>
</html>
